<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ship Scene</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="scene">

            <div class="c2-scroll">
                <div class="c2 cloud-2-0"></div>
                <div class="c2 cloud-2-1"></div>
                <div class="c2 cloud-2-2"></div>
                <div class="c2 cloud-2-3"></div>
                <div class="c2 cloud-2-4"></div>
            </div>

            <div class="c3-scroll">
                <div class="c3 cloud-3-0"></div>
                <div class="c3 cloud-3-1"></div>
                <div class="c3 cloud-3-2"></div>
                <div class="c3 cloud-3-3"></div>
            </div>

            <div class="ocean"></div>
            <div class="splash"></div>

            <div class="splash delay-1"></div>
            <div class="splash delay-2"></div>

            <div class="splash splash-4 delay-2"></div>
            <div class="splash splash-4 delay-3"></div>
            <div class="splash splash-4 delay-4"></div>
            <div class="splash splash-stone delay-3"></div>
            <div class="splash splash-stone splash-4"></div>
            <div class="splash splash-stone splash-5"></div>

            <div class="boat-container">
                <img class="boat" src="./boat.png">
            </div>

            <div class="foreground">
                <div class="rock-1 rock-r rock-right-light"></div>
                <div class="rock-2 rock-r rock-right"></div>
                <div class="rock-1 rock-r rock-right-dark"></div>

                <div class="rock-1 rock-l rock-left-dark"></div>

                <div class="grass-l-scroll">
                    <div class="grass grass-l grass-left-light"></div>
                    <div class="grass grass-l grass-left-dark"></div>
                    <div class="grass grass-l grass-left"></div>
                </div>

                <div class="grass-r-scroll">
                    <div class="grass grass-r grass-right"></div>
                    <div class="grass grass-r grass-right-light"></div>
                </div>
            </div>
        </div>
        <script src="./gsap-public/gsap-public/minified/gsap.min.js"></script>
        <script src="./gsap-public/gsap-public/minified/ScrollTrigger.min.js"></script>
        <script src="./main.js"></script>
    </body>

</html>
